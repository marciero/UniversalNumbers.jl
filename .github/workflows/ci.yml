name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Julia ${{ matrix.version }} — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1.11', 'nightly']
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake g++

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build shared library
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel

      - name: Instantiate Julia project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --startup-file=no --project=. test/runtests.jl

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - uses: julia-actions/cache@v2

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake g++

      - name: Build shared library
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel

      - name: Instantiate main project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Build and deploy docs
        env:
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl
